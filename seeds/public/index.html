<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Export Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        .control-section { margin-bottom: 30px; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover { background: #5568d3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .status { margin-top: 30px; display: none; }
        .status.active { display: block; }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        .metric { background: #f5f5f5; padding: 15px; border-radius: 5px; }
        .metric-label { font-size: 12px; color: #888; margin-bottom: 5px; }
        .metric-value { font-size: 20px; font-weight: bold; color: #333; }
        .download-link {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 15px;
        }
        .download-link:hover { background: #218838; }
        .exports-list { margin-top: 30px; }
        .export-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        .export-id { font-size: 12px; color: #888; font-family: monospace; }
        .export-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 8px;
        }
        .status-queued { background: #ffc107; color: black; }
        .status-processing { background: #17a2b8; color: white; }
        .status-completed { background: #28a745; color: white; }
        .status-failed { background: #dc3545; color: white; }
        .status-cancelled { background: #6c757d; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Live CSV Export Dashboard</h1>
        <p class="subtitle">Real-time export progress tracking</p>
        
        <div class="control-section">
            <button id="startBtn" onclick="startExport()">Start CSV Export</button>
            <button id="cancelBtn" onclick="cancelExport()" style="background: #dc3545; margin-left: 10px;" disabled>Cancel Export</button>
        </div>
        
        <div id="status" class="status">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill">0%</div>
            </div>
            
            <div class="metrics">
                <div class="metric">
                    <div class="metric-label">Processed</div>
                    <div class="metric-value" id="processedCount">0</div>
                </div>
                <div class="metric">
                    <div class="metric-label">ETA (seconds)</div>
                    <div class="metric-value" id="eta">--</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Status</div>
                    <div class="metric-value" id="currentStatus">--</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Speed (rows/sec)</div>
                    <div class="metric-value" id="speed">--</div>
                </div>
            </div>
            
            <div id="downloadSection"></div>
        </div>
        
        <div class="exports-list">
            <h3 style="margin-bottom: 15px;">Recent Exports</h3>
            <div id="exportsList"></div>
        </div>
    </div>
    
    <script>
        let currentExportId = null;
        let ws = null;
        
        async function startExport() {
            try {
                const response = await fetch('/api/exports', { method: 'POST' });
                const data = await response.json();
                currentExportId = data.exportId;
                
                document.getElementById('startBtn').disabled = true;
                document.getElementById('cancelBtn').disabled = false;
                document.getElementById('status').classList.add('active');
                
                connectWebSocket();
            } catch (err) {
                alert('Error starting export: ' + err.message);
            }
        }
        
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/exports/${currentExportId}`);
            
            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                updateStatus(message);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                alert('WebSocket connection error');
            };
        }
        
        function updateStatus(message) {
            const status = message.status;
            document.getElementById('currentStatus').textContent = status.toUpperCase();
            
            if (status === 'processing') {
                const progress = message.progress;
                const pct = progress.percentage;
                document.getElementById('progressFill').style.width = pct + '%';
                document.getElementById('progressFill').textContent = pct + '%';
                document.getElementById('processedCount').textContent = progress.processed.toLocaleString();
                document.getElementById('eta').textContent = progress.etaSeconds || '--';
            } else if (status === 'completed') {
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressFill').textContent = '100%';
                document.getElementById('startBtn').disabled = false;
                document.getElementById('cancelBtn').disabled = true;
                document.getElementById('downloadSection').innerHTML = 
                    `<a href="${message.downloadUrl}" class="download-link" download>Download CSV (${(message.fileSize / 1024 / 1024).toFixed(2)} MB)</a>`;
                loadExports();
            } else if (status === 'failed') {
                alert('Export failed: ' + message.error);
                document.getElementById('startBtn').disabled = false;
                document.getElementById('cancelBtn').disabled = true;
            } else if (status === 'cancelled') {
                alert('Export cancelled');
                document.getElementById('startBtn').disabled = false;
                document.getElementById('cancelBtn').disabled = true;
            }
        }
        
        function cancelExport() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'cancel' }));
            }
        }
        
        async function loadExports() {
            try {
                const response = await fetch('/api/exports');
                const data = await response.json();
                const list = document.getElementById('exportsList');
                list.innerHTML = data.exports.map(exp => `
                    <div class="export-item">
                        <div class="export-id">ID: ${exp.exportId}</div>
                        <span class="export-status status-${exp.status}">${exp.status.toUpperCase()}</span>
                        <div style="font-size: 12px; color: #888; margin-top: 5px;">Created: ${new Date(exp.createdAt).toLocaleString()}</div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Error loading exports:', err);
            }
        }
        
        // Load exports on page load
        loadExports();
        setInterval(loadExports, 10000);
    </script>
</body>
</html>
